name: Manual Trace project package contract

on:
  pull_request:
    branches: [main]
    paths:
      - 'schema/trace-project-package/**'
      - 'tools/manual-trace/trace-project-package.js'
      - 'tools/manual-trace/trace-project-package-production.js'
      - 'tools/manual-trace/app-08.js'
      - 'tools/manual-trace/app-09.js'
      - 'tools/manual-trace/index.html'
      - 'tools/manual-trace/test/trace-project-package/**'
      - 'tools/tonearm-profile-designer/test/**'
      - '.github/workflows/manual-trace-project-package-contract.yml'

permissions:
  contents: read

jobs:
  contract:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22.16.0'
      - name: Production and contract syntax
        run: |
          node --check tools/manual-trace/trace-project-package.js
          node --check tools/manual-trace/trace-project-package-production.js
          node --check tools/manual-trace/app-08.js
          node --check tools/manual-trace/app-09.js
          node --check tools/manual-trace/test/trace-project-package/contract-validator-core.mjs
          node --check tools/manual-trace/test/trace-project-package/identity-reference-validator.mjs
          node --check tools/manual-trace/test/trace-project-package/contract-validator.mjs
          node --check tools/manual-trace/test/trace-project-package/trace-project-package-contract.test.mjs
          node --check tools/manual-trace/test/trace-project-package/identity-reference-integrity.test.mjs
          node --check tools/manual-trace/test/trace-project-package/final-contract-closure.test.mjs
          node --check tools/manual-trace/test/trace-project-package/package-builder.test.mjs
          node --check tools/manual-trace/test/trace-project-package/package-adapter.test.mjs
          node --check tools/manual-trace/test/trace-project-package/package-production-contract.test.mjs
          node --check tools/manual-trace/test/trace-project-package/browser-export-smoke.mjs
      - name: Merged contract regressions
        run: |
          node --test tools/manual-trace/test/trace-project-package/trace-project-package-contract.test.mjs
          node --test tools/manual-trace/test/trace-project-package/identity-reference-integrity.test.mjs
          node --test tools/manual-trace/test/trace-project-package/final-contract-closure.test.mjs
      - name: Builder regressions
        run: node --test tools/manual-trace/test/trace-project-package/package-builder.test.mjs
      - name: Production contract and canonical-order regressions
        run: node --test tools/manual-trace/test/trace-project-package/package-production-contract.test.mjs
      - name: Manual Trace package adapter regression
        run: node --test tools/manual-trace/test/trace-project-package/package-adapter.test.mjs
      - name: Chromium multi-view export smoke
        run: node tools/manual-trace/test/trace-project-package/browser-export-smoke.mjs

  tonearm-regression:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22.16.0'
      - name: Tonearm Profile Designer portable regression
        run: npm --prefix tools/tonearm-profile-designer test

  root-gates:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    env:
      PUPPETEER_SKIP_DOWNLOAD: 'true'
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22.16.0'
      - name: Manual Trace regression
        run: node --test test/manual-trace-snap-policy.test.mjs
      - name: Clean generated output
        run: npm run clean
      - name: Production build
        run: npm run build
      - name: Generated SEO parity
        run: npm run check:seo
      - name: Deterministic build
        run: npm run check:determinism
      - name: Full sanitation gate
        run: npm run check:sanitation
