name: Final contract closure bootstrap

on: push

permissions:
  contents: write

jobs:
  apply:
    if: github.ref_name == 'feat/manual-trace-project-package-contract'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Apply verified closure payload
        shell: bash
        run: |
          set -euo pipefail
          cat .github/closure-payload/part-* | base64 -d | tar -xz
          rm -rf .github/closure-payload .github/workflows/final-contract-closure-bootstrap.yml
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add -A
          git commit -m 'fix: close Manual Trace package contract'
          git push origin HEAD:${GITHUB_REF_NAME}
