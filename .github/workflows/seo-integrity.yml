name: SEO integrity

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  verify:
    runs-on: ubuntu-latest
    timeout-minutes: 25
    env:
      PUPPETEER_SKIP_DOWNLOAD: 'true'
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22.16.0'
          cache: npm
          cache-dependency-path: tools/cobra-wand/package-lock.json
      - name: Source and schema contracts
        run: npm run check
      - name: Production build
        run: npm run build
      - name: Generated SEO parity
        run: npm run check:seo
      - name: Deterministic build
        run: npm run check:determinism
