name: SEO integrity

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  verify:
    runs-on: ubuntu-latest
    timeout-minutes: 25
    env:
      PUPPETEER_SKIP_DOWNLOAD: 'true'
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22.16.0'
      - name: JavaScript syntax
        run: |
          node --check scripts/lib/registry.mjs
          node --check scripts/lib/render.mjs
          node --check scripts/lib/verify.mjs
          node --check scripts/build.mjs
          node --check scripts/check-entry.mjs
          node --check scripts/clean.mjs
          node --check src/app.js
          node --check tools/manual-trace/app-00.js
          node --check tools/manual-trace/app-01.js
          node --check tools/manual-trace/app-02.js
          node --check tools/manual-trace/app-03.js
          node --check tools/manual-trace/app-04.js
          node --check tools/manual-trace/app-05.js
          node --check tools/manual-trace/app-06.js
          node --check tools/manual-trace/app-07.js
      - name: Manual Trace snap regression
        run: node --test test/manual-trace-snap-policy.test.mjs
      - name: Schema and registry
        run: npm run check:schema
      - name: Source governance
        run: npm run check
      - name: Production build
        run: npm run build
      - name: Generated SEO parity
        run: npm run check:seo
      - name: Deterministic build
        run: npm run check:determinism
