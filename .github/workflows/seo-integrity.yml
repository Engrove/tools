name: SEO integrity

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  verify:
    runs-on: ubuntu-latest
    timeout-minutes: 25
    env:
      PUPPETEER_SKIP_DOWNLOAD: 'true'
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22.16.0'
          cache: npm
          cache-dependency-path: tools/cobra-wand/package-lock.json
      - name: Capture syntax diagnostics
        id: syntax
        shell: bash
        run: |
          set +e
          node --check scripts/lib/seo-core.mjs > syntax-diagnostics.txt 2>&1
          status=$?
          echo "status=$status" >> "$GITHUB_OUTPUT"
          cat syntax-diagnostics.txt
          exit 0
      - uses: actions/upload-artifact@v4
        with:
          name: syntax-diagnostics
          path: syntax-diagnostics.txt
      - name: Enforce syntax result
        run: test "${{ steps.syntax.outputs.status }}" = "0"
      - name: Syntax remaining sources
        run: |
          node --check scripts/build.mjs
          node --check scripts/check-entry.mjs
          node --check scripts/clean.mjs
          node --check src/app.js
      - name: Schema and registry
        run: npm run check:schema
      - name: Source governance
        run: npm run check
      - name: Production build
        run: npm run build
      - name: Generated SEO parity
        run: npm run check:seo
      - name: Deterministic build
        run: npm run check:determinism
