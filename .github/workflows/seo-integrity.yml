name: SEO integrity

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  verify:
    runs-on: ubuntu-latest
    timeout-minutes: 25
    env:
      PUPPETEER_SKIP_DOWNLOAD: 'true'
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22.16.0'
          cache: npm
          cache-dependency-path: tools/cobra-wand/package-lock.json
      - name: JavaScript syntax
        run: |
          node --check scripts/lib/registry.mjs
          node --check scripts/lib/render.mjs
          node --check scripts/lib/verify.mjs
          node --check scripts/build.mjs
          node --check scripts/check-entry.mjs
          node --check scripts/clean.mjs
          node --check src/app.js
      - name: Capture registry diagnostics
        id: registry
        shell: bash
        run: |
          set +e
          npm run check:schema > registry-diagnostics.txt 2>&1
          status=$?
          echo "status=$status" >> "$GITHUB_OUTPUT"
          exit 0
      - uses: actions/upload-artifact@v4
        with:
          name: registry-diagnostics
          path: registry-diagnostics.txt
      - name: Enforce registry result
        run: test "${{ steps.registry.outputs.status }}" = "0"
      - name: Source governance
        run: npm run check
      - name: Production build
        run: npm run build
      - name: Generated SEO parity
        run: npm run check:seo
      - name: Deterministic build
        run: npm run check:determinism
