name: SEO and AI discovery validation

on:
  pull_request:
    branches: [main]
  push:
    branches: [main, agent/seo-ai-compiler]

permissions:
  contents: read

jobs:
  validate:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22.12.0'
          cache: npm
          cache-dependency-path: tools/cobra-wand/package-lock.json
      - name: Build and validate SEO surfaces
        run: npm run check:sanitation
      - name: Verify deterministic output
        run: npm run check:determinism
