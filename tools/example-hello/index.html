<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Hello Example — Engrove Tools</title>
    <style>
      :root {
        color-scheme: light dark;
        --bg: #f6f7f9;
        --card: #fff;
        --text: #1a1d21;
        --muted: #626873;
        --accent: #3b6ef6;
        --border: #e3e6ea;
      }
      @media (prefers-color-scheme: dark) {
        :root {
          --bg: #0e1116;
          --card: #171b22;
          --text: #e8eaed;
          --muted: #9aa2ad;
          --accent: #6b93ff;
          --border: #262c36;
        }
      }
      * { box-sizing: border-box; }
      body {
        margin: 0;
        min-height: 100vh;
        display: grid;
        place-items: center;
        padding: 24px;
        background: var(--bg);
        color: var(--text);
        font-family: system-ui, -apple-system, 'Segoe UI', Roboto, sans-serif;
      }
      .card {
        background: var(--card);
        border: 1px solid var(--border);
        border-radius: 16px;
        padding: 32px;
        max-width: 460px;
        width: 100%;
        box-shadow: 0 10px 30px rgba(0, 0, 0, 0.08);
      }
      a.back {
        color: var(--accent);
        text-decoration: none;
        font-size: 0.9rem;
      }
      a.back:hover { text-decoration: underline; }
      h1 { margin: 12px 0 6px; }
      p { color: var(--muted); line-height: 1.55; }
      button {
        margin-top: 8px;
        border: 0;
        background: var(--accent);
        color: #fff;
        font-size: 1rem;
        padding: 10px 18px;
        border-radius: 10px;
        cursor: pointer;
      }
      #out { margin-top: 16px; font-size: 1.1rem; min-height: 1.5em; }
    </style>
  </head>
  <body>
    <div class="card">
      <a class="back" href="../../index.html">← All tools</a>
      <h1>👋 Hello Example</h1>
      <p>
        This is a placeholder tool that shows the folder layout. Each tool lives in its own
        folder under <code>tools/</code> with an <code>index.html</code> (and an optional
        <code>tool.json</code> for its name, icon, description and tags).
      </p>
      <button id="btn" type="button">Say hello</button>
      <div id="out"></div>
    </div>
    <script>
      const out = document.getElementById('out');
      document.getElementById('btn').addEventListener('click', () => {
        out.textContent = `Hello! It is ${new Date().toLocaleString()}.`;
      });
    </script>
  </body>
</html>
